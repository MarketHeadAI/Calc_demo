<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор займа — Finmoll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ─────────────────────────────────────
       ЦВЕТОВЫЕ ТЕМЫ
       --accent      : основной акцент (слайдер, кнопка, подчёркивание)
       --accent-dark : hover-состояние кнопки
       --accent-glow : тень thumb
       tab1 (до 15 000) = ФИН  = яркий светло-зелёный
       tab2 (до 100 000) = МОЛЛ = глубокий тёмно-зелёный
    ───────────────────────────────────── */
    .card {
      --accent:      #1A6B30;
      --accent-dark: #134f23;
      --accent-glow: rgba(26,107,48,0.45);
      transition: --accent 0.3s;
    }
    .card.theme-light {
      --accent:      #5CB840;
      --accent-dark: #45932e;
      --accent-glow: rgba(92,184,64,0.45);
    }

    /* ── Карточка ── */
    .card {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.05);
      overflow: hidden;
    }

    /* ══════════════════════════════
       ТАБЫ
    ══════════════════════════════ */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1.5px solid #e9ecef;
    }

    .tab {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 12px 14px;
      cursor: pointer;
      position: relative;
      user-select: none;
    }
    .tab:first-child { border-right: 1.5px solid #e9ecef; }

    /* Иконка и текст — неактивный */
    .tab .tab-icon { color: #adb5bd; transition: color 0.25s; }
    .tab .tab-text {
      font-size: 14px;
      font-weight: 600;
      color: #adb5bd;
      white-space: nowrap;
      transition: color 0.25s;
    }

    /* Активный таб */
    .tab.active .tab-icon { color: #1a1f2e; }
    .tab.active .tab-text { color: #1a1f2e; }
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1.5px;
      left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 3px 3px 0 0;
      transition: background 0.3s;
    }

    /* ══════════════════════════════
       ТЕЛО КАРТОЧКИ
    ══════════════════════════════ */
    .card-body {
      padding: 20px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ══════════════════════════════
       ПОЛЕ СО СЛАЙДЕРОМ ВНУТРИ
    ══════════════════════════════ */
    .field-box {
      border: 1.5px solid #dee2e6;
      border-radius: 10px;
      padding: 12px 16px 0;
      position: relative;
      overflow: visible;
      transition: border-color 0.25s;
    }
    .field-box:focus-within { border-color: var(--accent); }

    .field-box-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }

    .f-label {
      font-size: 12px;
      font-weight: 500;
      color: #9ca3af;
      line-height: 1;
      margin-bottom: 4px;
    }
    .f-value {
      font-size: 24px;
      font-weight: 800;
      color: #1a1f2e;
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 14px;
    }
    .f-side {
      font-size: 12px;
      font-weight: 500;
      color: #9ca3af;
      text-align: right;
      padding-top: 2px;
    }

    /* ── Слайдер внутри поля ── */
    .inner-slider {
      position: relative;
      height: 20px;
      margin: 0 -16px;
      margin-bottom: -1.5px;
    }

    .is-rail {
      position: absolute;
      bottom: 8px;
      left: 16px; right: 16px;
      height: 4px;
      background: #e9ecef;
      border-radius: 100px;
    }
    .is-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      background: var(--accent);
      border-radius: 100px;
      transition: background 0.3s, width 0.05s linear;
    }

    .is-thumb {
      position: absolute;
      bottom: 0;
      transform: translateX(-50%);
      width: 26px;
      height: 26px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 2px 8px var(--accent-glow);
      pointer-events: none;
      transition: background 0.3s, box-shadow 0.3s, transform 0.15s;
    }
    .inner-slider:hover .is-thumb {
      box-shadow: 0 3px 14px var(--accent-glow);
      transform: translateX(-50%) scale(1.08);
    }

    .is-input {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      width: 100%;
      height: 26px;
      opacity: 0;
      cursor: pointer;
      margin: 0;
    }
    .is-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 26px; height: 26px;
      cursor: pointer;
    }

    /* ══════════════════════════════
       КНОПКА CTA
    ══════════════════════════════ */
    .btn-cta {
      display: block;
      width: 100%;
      padding: 19px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Manrope', sans-serif;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.3s, box-shadow 0.3s, transform 0.1s;
      box-shadow: 0 4px 16px var(--accent-glow);
      margin-top: 4px;
    }
    .btn-cta:hover { filter: brightness(0.88); }
    .btn-cta:active { transform: scale(0.99); }

    /* ── Адаптив ── */
    @media (max-width: 480px) {
      body { padding: 0; align-items: flex-start; }
      .card { border-radius: 0; box-shadow: none; min-height: 100vh; }
    }

  </style>
</head>
<body>

<div class="card" id="card">

  <!-- ТАБЫ -->
  <div class="tabs">
    <div class="tab" id="tab1" onclick="switchTab(1, true)">
      <!-- Монета с рублём — до 15 000 -->
      <svg class="tab-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="9" y1="7" x2="9" y2="17"/>
        <path d="M9 7h3.5a2.5 2.5 0 0 1 0 5H9"/>
        <line x1="7.5" y1="14" x2="13.5" y2="14"/>
      </svg>
      <span class="tab-text">До 15 000 ₽</span>
    </div>
    <div class="tab active" id="tab2" onclick="switchTab(2, true)">
      <!-- Кредитная карта — до 100 000 -->
      <svg class="tab-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="4" width="22" height="16" rx="2"/>
        <line x1="1" y1="10" x2="23" y2="10"/>
        <line x1="5" y1="15" x2="9" y2="15"/>
        <line x1="12" y1="15" x2="14" y2="15"/>
      </svg>
      <span class="tab-text">До 100 000 ₽</span>
    </div>
  </div>

  <!-- ТЕЛО -->
  <div class="card-body">

    <!-- Сумма займа -->
    <div class="field-box">
      <div class="f-label">Сумма займа</div>
      <div class="f-value" id="sum-val">65 000 ₽</div>
      <div class="inner-slider" id="sum-wrap">
        <div class="is-rail"><div class="is-fill" id="sum-fill"></div></div>
        <div class="is-thumb" id="sum-thumb"></div>
        <input class="is-input" type="range"
               id="sum-range" min="0" max="79" value="44" step="1"
               oninput="onSum(+this.value)">
      </div>
    </div>

    <!-- Срок займа -->
    <div class="field-box">
      <div class="field-box-top">
        <div>
          <div class="f-label">Срок займа</div>
          <div class="f-value" id="term-val">30 дней</div>
        </div>
        <div class="f-side" id="term-date"></div>
      </div>
      <div class="inner-slider" id="term-wrap">
        <div class="is-rail"><div class="is-fill" id="term-fill"></div></div>
        <div class="is-thumb" id="term-thumb"></div>
        <input class="is-input" type="range"
               id="term-range" min="0" max="10" value="3" step="1"
               oninput="onTerm(+this.value)">
      </div>
    </div>

    <!-- CTA -->
    <button class="btn-cta" id="btn-cta">Получить 65 000 ₽</button>

  </div>
</div>

<script>
  /*
   * ПРАВИЛА:
   *  Сумма ≤ 15 000  → таб 1 (светло-зелёный), срок только дни  (индексы 0–3)
   *  Сумма > 15 000  → таб 2 (тёмно-зелёный),  срок только недели (индексы 4–10)
   *
   *  Слайдер суммы работает по индексам 0–79, отображённым на массив SUM_VALUES.
   *  Массив пропускает диапазон 15 001–34 999: индекс 13 = 15 000, индекс 14 = 35 000.
   *  Никакого снапа нет — слайдер физически не может попасть в запрещённую зону.
   */

  /* ── Массив допустимых сумм ── */
  const SUM_VALUES = [];
  for (let v = 2000;  v <= 15000;  v += 1000) SUM_VALUES.push(v);  /* 0–13  */
  for (let v = 35000; v <= 100000; v += 1000) SUM_VALUES.push(v);  /* 14–79 */
  /* SUM_VALUES.length = 80, max index = 79 */

  const LAST_TAB1_IDX  = 13;   /* индекс 15 000 — последний в группе «дни»   */
  const FIRST_TAB2_IDX = 14;   /* индекс 35 000 — первый в группе «недели»   */

  const THRESHOLD      = 15000;
  const IDX_LAST_DAY   = 3;    /* индекс «30 дней»  */
  const IDX_FIRST_WEEK = 4;    /* индекс «45 недель» */

  const TERMS = [
    { label: '7 дней',    days: 7   },
    { label: '14 дней',   days: 14  },
    { label: '21 день',   days: 21  },
    { label: '30 дней',   days: 30  },
    { label: '45 недель', days: 315 },
    { label: '46 недель', days: 322 },
    { label: '47 недель', days: 329 },
    { label: '48 недель', days: 336 },
    { label: '49 недель', days: 343 },
    { label: '50 недель', days: 350 },
    { label: '53 недели', days: 371 },
  ];

  let activeTab = 2;
  let sumIdx    = 44;                    /* индекс 65 000 = 14 + (65000-35000)/1000 */
  let sumVal    = SUM_VALUES[44];        /* 65 000                                  */
  let termIdx   = IDX_FIRST_WEEK;

  /* ── Тема ── */
  function applyTheme(tab) {
    document.getElementById('card').classList.toggle('theme-light', tab === 1);
  }

  /* ── Переключение визуала табов ── */
  function setActiveTab(n) {
    activeTab = n;
    document.getElementById('tab1').classList.toggle('active', n === 1);
    document.getElementById('tab2').classList.toggle('active', n === 2);
    applyTheme(n);
  }

  /* ── Ручной клик по табу ── */
  function switchTab(n) {
    if (activeTab === n) return;
    setActiveTab(n);
    if (n === 1) {
      if (sumIdx > LAST_TAB1_IDX) {
        sumIdx = LAST_TAB1_IDX;
        document.getElementById('sum-range').value = LAST_TAB1_IDX;
      }
      if (termIdx > IDX_LAST_DAY) setTerm(IDX_LAST_DAY);
      updateTermRange(1);
    } else {
      if (termIdx <= IDX_LAST_DAY) setTerm(IDX_FIRST_WEEK);
      updateTermRange(2);
    }
    renderSum();
  }

  /* ── Ограничение диапазона слайдера срока ── */
  function updateTermRange(tab) {
    const r = document.getElementById('term-range');
    if (tab === 1) {
      r.min = 0; r.max = IDX_LAST_DAY;
      if (+r.value > IDX_LAST_DAY) r.value = IDX_LAST_DAY;
    } else {
      r.min = IDX_FIRST_WEEK; r.max = TERMS.length - 1;
      if (+r.value < IDX_FIRST_WEEK) r.value = IDX_FIRST_WEEK;
    }
  }

  /* ── Отрисовка суммы ── */
  function renderSum() {
    sumVal = SUM_VALUES[sumIdx];
    const fmt = sumVal.toLocaleString('ru-RU') + ' ₽';
    document.getElementById('sum-val').textContent = fmt;
    document.getElementById('btn-cta').textContent = 'Получить ' + fmt;
    const pct = sumIdx / (SUM_VALUES.length - 1) * 100;
    setSliderPos('sum', pct);
  }

  /* ── Обработчик слайдера суммы ── */
  function onSum(idx) {
    sumIdx = idx;
    const newTab = SUM_VALUES[idx] <= THRESHOLD ? 1 : 2;

    if (newTab !== activeTab) {
      setActiveTab(newTab);
      if (newTab === 1 && termIdx > IDX_LAST_DAY)   setTerm(IDX_LAST_DAY);
      if (newTab === 2 && termIdx <= IDX_LAST_DAY)  setTerm(IDX_FIRST_WEEK);
      updateTermRange(newTab);
    }

    renderSum();
  }

  /* ── Отрисовка и запись срока ── */
  function setTerm(idx) {
    termIdx = idx;
    document.getElementById('term-range').value = idx;

    const t = TERMS[idx];
    document.getElementById('term-val').textContent = t.label;
    const end = new Date();
    end.setDate(end.getDate() + t.days);
    document.getElementById('term-date').textContent =
      'До ' + end.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });

    let pct;
    if (idx <= IDX_LAST_DAY) {
      pct = idx / IDX_LAST_DAY * 100;
    } else {
      pct = (idx - IDX_FIRST_WEEK) / (TERMS.length - 1 - IDX_FIRST_WEEK) * 100;
    }
    setSliderPos('term', pct);
  }

  /* ── Обработчик слайдера срока ── */
  function onTerm(idx) {
    /* Если выбраны «дни» при сумме > порога — сумма снапится к 15 000 */
    if (idx <= IDX_LAST_DAY && sumVal > THRESHOLD) {
      sumIdx = LAST_TAB1_IDX;
      document.getElementById('sum-range').value = LAST_TAB1_IDX;
      setActiveTab(1);
      updateTermRange(1);
      renderSum();
    }
    setTerm(idx);
  }

  /* ── Позиция fill + thumb ── */
  function setSliderPos(id, pct) {
    document.getElementById(id + '-fill').style.width = pct + '%';
    const railW = document.getElementById(id + '-wrap').querySelector('.is-rail').offsetWidth;
    document.getElementById(id + '-thumb').style.left = (16 + railW * pct / 100) + 'px';
  }

  /* ── Ресайз ── */
  window.addEventListener('resize', () => { renderSum(); setTerm(termIdx); });

  /* ── Инициализация ── */
  updateTermRange(2);
  renderSum();
  setTerm(IDX_FIRST_WEEK);
</script>

</body>
</html>
