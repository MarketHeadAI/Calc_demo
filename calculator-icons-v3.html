<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор займа — Finmoll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── Карточка ── */
    .card {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.05);
      overflow: hidden;
    }

    /* ══════════════════════════════
       ТАБЫ
    ══════════════════════════════ */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1.5px solid #e9ecef;
    }

    .tab {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 12px 14px;
      cursor: pointer;
      position: relative;
      transition: background 0.15s;
      user-select: none;
    }
    .tab:first-child {
      border-right: 1.5px solid #e9ecef;
    }

    /* Неактивный таб */
    .tab .tab-icon { color: #adb5bd; transition: color 0.15s; }
    .tab .tab-text {
      font-size: 14px;
      font-weight: 600;
      color: #adb5bd;
      transition: color 0.15s;
      white-space: nowrap;
    }

    /* Активный таб */
    .tab.active .tab-icon { color: #1a1f2e; }
    .tab.active .tab-text { color: #1a1f2e; }
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1.5px;
      left: 0; right: 0;
      height: 3px;
      background: #3D9B58;
      border-radius: 3px 3px 0 0;
    }

    /* ══════════════════════════════
       ТЕЛО КАРТОЧКИ
    ══════════════════════════════ */
    .card-body {
      padding: 20px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ══════════════════════════════
       ПОЛЕ СО СЛАЙДЕРОМ ВНУТРИ
    ══════════════════════════════ */
    .field-box {
      border: 1.5px solid #dee2e6;
      border-radius: 10px;
      padding: 12px 16px 0;
      position: relative;
      transition: border-color 0.15s;
      overflow: visible;
    }
    .field-box:focus-within {
      border-color: #3D9B58;
    }

    .field-box-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }

    .f-label {
      font-size: 12px;
      font-weight: 500;
      color: #9ca3af;
      line-height: 1;
      margin-bottom: 4px;
    }
    .f-value {
      font-size: 24px;
      font-weight: 800;
      color: #1a1f2e;
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 14px;
    }
    .f-side {
      font-size: 12px;
      font-weight: 500;
      color: #9ca3af;
      text-align: right;
      padding-top: 2px;
    }

    /* ── Слайдер внутри поля ── */
    .inner-slider {
      position: relative;
      height: 20px;           /* пространство для thumb */
      margin: 0 -16px;        /* выходит за padding поля */
      margin-bottom: -1.5px;  /* нависает на border поля снизу */
    }

    /* Трек */
    .is-rail {
      position: absolute;
      bottom: 8px;
      left: 16px; right: 16px;
      height: 4px;
      background: #e9ecef;
      border-radius: 100px;
    }
    .is-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      background: #3D9B58;
      border-radius: 100px;
    }

    /* Thumb визуальный */
    .is-thumb {
      position: absolute;
      bottom: 0;
      transform: translateX(-50%);
      width: 26px;
      height: 26px;
      background: #3D9B58;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(61,155,88,0.45);
      pointer-events: none;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .inner-slider:hover .is-thumb {
      box-shadow: 0 3px 14px rgba(61,155,88,0.60);
      transform: translateX(-50%) scale(1.08);
    }

    /* Нативный input поверх */
    .is-input {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      width: 100%;
      height: 26px;
      opacity: 0;
      cursor: pointer;
      margin: 0;
    }
    .is-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 26px; height: 26px;
      cursor: pointer;
    }

    /* ══════════════════════════════
       КНОПКА CTA
    ══════════════════════════════ */
    .btn-cta {
      display: block;
      width: 100%;
      padding: 19px 16px;
      background: #3D9B58;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Manrope', sans-serif;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.18s, box-shadow 0.18s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(61,155,88,0.38);
      margin-top: 4px;
    }
    .btn-cta:hover {
      background: #2d7a44;
      box-shadow: 0 6px 22px rgba(61,155,88,0.50);
    }
    .btn-cta:active { transform: scale(0.99); }

    /* ── Адаптив ── */
    @media (max-width: 480px) {
      body { padding: 0; align-items: flex-start; }
      .card { border-radius: 0; box-shadow: none; min-height: 100vh; }
    }

  </style>
</head>
<body>

<div class="card">

  <!-- ТАБЫ -->
  <div class="tabs">
    <div class="tab" id="tab1" onclick="switchTab(1)">
      <!-- иконка: монета с рублём -->
      <svg class="tab-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="9" y1="7" x2="9" y2="17"/>
        <path d="M9 7h3.5a2.5 2.5 0 0 1 0 5H9"/>
        <line x1="7.5" y1="14" x2="13.5" y2="14"/>
      </svg>
      <span class="tab-text">До 30 000 ₽</span>
    </div>
    <div class="tab active" id="tab2" onclick="switchTab(2)">
      <!-- иконка: кредитная карта -->
      <svg class="tab-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="4" width="22" height="16" rx="2"/>
        <line x1="1" y1="10" x2="23" y2="10"/>
        <line x1="5" y1="15" x2="9" y2="15"/>
        <line x1="12" y1="15" x2="14" y2="15"/>
      </svg>
      <span class="tab-text">До 100 000 ₽</span>
    </div>
  </div>

  <!-- ТЕЛО -->
  <div class="card-body">

    <!-- Сумма займа -->
    <div class="field-box">
      <div class="f-label">Сумма займа</div>
      <div class="f-value" id="sum-val">65 000 ₽</div>
      <div class="inner-slider" id="sum-wrap">
        <div class="is-rail"><div class="is-fill" id="sum-fill"></div></div>
        <div class="is-thumb" id="sum-thumb"></div>
        <input class="is-input" type="range"
               id="sum-range" min="2000" max="100000" value="65000" step="1000"
               oninput="onSum(+this.value)">
      </div>
    </div>

    <!-- Срок займа -->
    <div class="field-box">
      <div class="field-box-top">
        <div>
          <div class="f-label">Срок займа</div>
          <div class="f-value" id="term-val">30 дней</div>
        </div>
        <div class="f-side" id="term-date"></div>
      </div>
      <div class="inner-slider" id="term-wrap">
        <div class="is-rail"><div class="is-fill" id="term-fill"></div></div>
        <div class="is-thumb" id="term-thumb"></div>
        <input class="is-input" type="range"
               id="term-range" min="0" max="10" value="3" step="1"
               oninput="onTerm(+this.value)">
      </div>
    </div>

    <!-- CTA -->
    <button class="btn-cta" id="btn-cta">Получить 65 000 ₽</button>

  </div>
</div>

<script>
  /* ── Конфигурация по табам ── */
  const TAB_CFG = {
    1: { min: 2000,  max: 30000,  start: 15000 },
    2: { min: 2000,  max: 100000, start: 65000 }
  };

  /* ── Дискретные сроки ── */
  const TERMS = [
    { label: '7 дней',    days: 7   },
    { label: '14 дней',   days: 14  },
    { label: '21 день',   days: 21  },
    { label: '30 дней',   days: 30  },
    { label: '45 недель', days: 315 },
    { label: '46 недель', days: 322 },
    { label: '47 недель', days: 329 },
    { label: '48 недель', days: 336 },
    { label: '49 недель', days: 343 },
    { label: '50 недель', days: 350 },
    { label: '53 недели', days: 371 },
  ];

  let activeTab = 2;
  let sumVal    = 65000;
  let termIdx   = 3;

  /* ── Переключение таба ── */
  function switchTab(n) {
    activeTab = n;
    document.getElementById('tab1').classList.toggle('active', n === 1);
    document.getElementById('tab2').classList.toggle('active', n === 2);
    const cfg = TAB_CFG[n];
    const range = document.getElementById('sum-range');
    range.min   = cfg.min;
    range.max   = cfg.max;
    const newVal = Math.min(Math.max(sumVal, cfg.min), cfg.max);
    range.value = newVal;
    onSum(newVal);
  }

  /* ── Сумма ── */
  function onSum(v) {
    sumVal = v;
    const cfg = TAB_CFG[activeTab];
    const pct = (v - cfg.min) / (cfg.max - cfg.min) * 100;
    const fmt = v.toLocaleString('ru-RU') + ' ₽';
    document.getElementById('sum-val').textContent = fmt;
    document.getElementById('btn-cta').textContent = 'Получить ' + fmt;
    setSlider('sum', pct);
  }

  /* ── Срок ── */
  function onTerm(idx) {
    termIdx = idx;
    const t   = TERMS[idx];
    const pct = idx / (TERMS.length - 1) * 100;
    document.getElementById('term-val').textContent = t.label;
    // Дата погашения
    const end = new Date();
    end.setDate(end.getDate() + t.days);
    document.getElementById('term-date').textContent =
      'До ' + end.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
    setSlider('term', pct);
  }

  /* ── Позиция fill + thumb ── */
  function setSlider(id, pct) {
    document.getElementById(id + '-fill').style.width = pct + '%';
    // thumb позиционируем относительно ширины рельса (с учётом отступов 16px с каждой стороны)
    const wrap  = document.getElementById(id + '-wrap');
    const rail  = wrap.querySelector('.is-rail');
    const thumb = document.getElementById(id + '-thumb');
    const railW = rail.offsetWidth;
    thumb.style.left = (16 + railW * pct / 100) + 'px';
  }

  /* ── Пересчёт позиций при ресайзе ── */
  function recalc() {
    const cfg = TAB_CFG[activeTab];
    setSlider('sum',  (sumVal - cfg.min) / (cfg.max - cfg.min) * 100);
    setSlider('term', termIdx / (TERMS.length - 1) * 100);
  }
  window.addEventListener('resize', recalc);

  /* ── Инициализация ── */
  onSum(65000);
  onTerm(3);
</script>

</body>
</html>
