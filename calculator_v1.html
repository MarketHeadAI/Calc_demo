<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор займа — Finmoll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>

    /* ── Страница ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f4f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── Карточка ── */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 28px 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.05);
    }

    /* ── Заголовок ── */
    .card-title {
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      color: #1a1f2e;
      margin-bottom: 28px;
      letter-spacing: -0.3px;
    }

    /* ── Блок: метка + значение ── */
    .field-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .field-label {
      font-size: 15px;
      font-weight: 500;
      color: #6b7280;
    }
    .field-value {
      font-size: 22px;
      font-weight: 800;
      color: #1a1f2e;
      letter-spacing: -0.5px;
    }

    /* ── Жирный слайдер (fat pill) ── */
    .slider-wrap {
      position: relative;
      height: 14px;
      margin-bottom: 8px;
    }

    /* Трек-подложка */
    .s-rail {
      position: absolute;
      inset: 0;
      background: #e4e4e7;
      border-radius: 100px;
      overflow: visible;
    }

    /* Заливка слева от thumb */
    .s-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      background: #3D9B58;
      border-radius: 100px;
      pointer-events: none;
    }

    /* Thumb визуальный */
    .s-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      background: #fff;
      border: 2.5px solid #3D9B58;
      border-radius: 50%;
      box-shadow: 0 2px 10px rgba(61,155,88,0.40);
      pointer-events: none;
      transition: box-shadow 0.15s;
    }

    /* Прозрачный нативный range поверх — управление */
    .s-input {
      position: absolute;
      inset: -8px 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: calc(100% + 16px);
      margin: 0;
    }
    .s-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px; height: 28px;
      cursor: pointer;
    }

    /* Hover: thumb свечение */
    .slider-wrap:hover .s-thumb {
      box-shadow: 0 2px 18px rgba(61,155,88,0.55);
    }

    /* Подписи мин/макс */
    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 500;
      color: #9ca3af;
      margin-bottom: 24px;
    }

    /* ── CTA кнопка ── */
    .btn-cta {
      display: block;
      width: 100%;
      padding: 19px;
      background: #3D9B58;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Manrope', sans-serif;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
      box-shadow: 0 4px 16px rgba(61,155,88,0.38);
    }
    .btn-cta:hover {
      background: #2d7a44;
      box-shadow: 0 6px 22px rgba(61,155,88,0.50);
    }
    .btn-cta:active { transform: scale(0.99); }

    /* ── Адаптив мобильный ── */
    @media (max-width: 480px) {
      body { padding: 0; align-items: flex-start; }
      .card {
        border-radius: 0;
        min-height: 100vh;
        padding: 28px 20px 24px;
        box-shadow: none;
      }
    }

  </style>
</head>
<body>

<div class="card">

  <h1 class="card-title">Калькулятор займа</h1>

  <!-- ── СУММА ── -->
  <div class="field-header">
    <span class="field-label">Сумма</span>
    <span class="field-value" id="sum-val">65 000 ₽</span>
  </div>

  <div class="slider-wrap" id="sum-wrap">
    <div class="s-rail">
      <div class="s-fill" id="sum-fill"></div>
    </div>
    <div class="s-thumb" id="sum-thumb"></div>
    <input class="s-input" type="range"
           id="sum-range"
           min="2000" max="100000" value="65000" step="1000"
           oninput="onSum(+this.value)">
  </div>

  <div class="slider-labels">
    <span>2 000 ₽</span>
    <span>100 000 ₽</span>
  </div>

  <!-- ── СРОК ── -->
  <div class="field-header">
    <span class="field-label">Срок</span>
    <span class="field-value" id="term-val">30 дней</span>
  </div>

  <div class="slider-wrap" id="term-wrap">
    <div class="s-rail">
      <div class="s-fill" id="term-fill"></div>
    </div>
    <div class="s-thumb" id="term-thumb"></div>
    <input class="s-input" type="range"
           id="term-range"
           min="0" max="10" value="3" step="1"
           oninput="onTerm(+this.value)">
  </div>

  <div class="slider-labels">
    <span>7 дней</span>
    <span>53 недели</span>
  </div>

  <!-- ── КНОПКА ── -->
  <button class="btn-cta">Получить деньги</button>

</div>

<script>
  /* Дискретные значения срока */
  const TERMS = [
    '7 дней', '14 дней', '21 день', '30 дней',
    '45 недель', '46 недель', '47 недель', '48 недель',
    '49 недель', '50 недель', '53 недели'
  ];

  /* ── Обновить слайдер суммы ── */
  function onSum(v) {
    const pct = (v - 2000) / (100000 - 2000) * 100;
    document.getElementById('sum-val').textContent =
      v.toLocaleString('ru-RU') + ' ₽';
    setSlider('sum', pct);
  }

  /* ── Обновить слайдер срока ── */
  function onTerm(idx) {
    const pct = idx / (TERMS.length - 1) * 100;
    document.getElementById('term-val').textContent = TERMS[idx];
    setSlider('term', pct);
  }

  /* ── Установить положение fill + thumb ── */
  function setSlider(id, pct) {
    document.getElementById(id + '-fill').style.width  = pct + '%';
    document.getElementById(id + '-thumb').style.left  = pct + '%';
  }

  /* ── Инициализация ── */
  onSum(65000);
  onTerm(3);        /* 30 дней — стартовое значение */
</script>

</body>
</html>
