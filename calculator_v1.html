<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор займа — Finmoll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>

    /* ── Страница ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f4f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── Карточка ── */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 28px 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.05);
    }

    /* ── Заголовок ── */
    .card-title {
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      color: #1a1f2e;
      margin-bottom: 28px;
      letter-spacing: -0.3px;
    }

    /* ── Блок: метка + значение ── */
    .field-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .field-label {
      font-size: 15px;
      font-weight: 500;
      color: #6b7280;
    }
    .field-value {
      font-size: 22px;
      font-weight: 800;
      color: #1a1f2e;
      letter-spacing: -0.5px;
    }

    /* ── Жирный слайдер (fat pill) ── */
    .slider-wrap {
      position: relative;
      height: 14px;
      margin-bottom: 8px;
    }

    /* Трек-подложка */
    .s-rail {
      position: absolute;
      inset: 0;
      background: #e4e4e7;
      border-radius: 100px;
      overflow: visible;
    }

    /* Заливка слева от thumb */
    .s-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      background: #3D9B58;
      border-radius: 100px;
      pointer-events: none;
    }

    /* Thumb визуальный */
    .s-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      background: #fff;
      border: 2.5px solid #3D9B58;
      border-radius: 50%;
      box-shadow: 0 2px 10px rgba(61,155,88,0.40);
      pointer-events: none;
      transition: box-shadow 0.15s;
    }

    /* Прозрачный нативный range поверх — управление */
    .s-input {
      position: absolute;
      inset: -8px 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: calc(100% + 16px);
      margin: 0;
    }
    .s-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px; height: 28px;
      cursor: pointer;
    }

    /* Hover: thumb свечение */
    .slider-wrap:hover .s-thumb {
      box-shadow: 0 2px 18px rgba(61,155,88,0.55);
    }

    /* Подписи мин/макс */
    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 500;
      color: #9ca3af;
      margin-bottom: 24px;
    }

    /* ── CTA кнопка ── */
    .btn-cta {
      display: block;
      width: 100%;
      padding: 19px;
      background: #3D9B58;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Manrope', sans-serif;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
      box-shadow: 0 4px 16px rgba(61,155,88,0.38);
    }
    .btn-cta:hover {
      background: #2d7a44;
      box-shadow: 0 6px 22px rgba(61,155,88,0.50);
    }
    .btn-cta:active { transform: scale(0.99); }

    /* ── Адаптив мобильный ── */
    @media (max-width: 480px) {
      body { padding: 0; align-items: flex-start; }
      .card {
        border-radius: 0;
        min-height: 100vh;
        padding: 28px 20px 24px;
        box-shadow: none;
      }
    }

  </style>
</head>
<body>

<div class="card">

  <h1 class="card-title">Калькулятор займа</h1>

  <!-- ── СУММА ── -->
  <div class="field-header">
    <span class="field-label">Сумма</span>
    <span class="field-value" id="sum-val">65 000 ₽</span>
  </div>

  <div class="slider-wrap" id="sum-wrap">
    <div class="s-rail">
      <div class="s-fill" id="sum-fill"></div>
    </div>
    <div class="s-thumb" id="sum-thumb"></div>
    <input class="s-input" type="range"
           id="sum-range"
           min="0" max="79" value="44" step="1"
           oninput="onSum(+this.value)">
  </div>

  <div class="slider-labels">
    <span>2 000 ₽</span>
    <span>100 000 ₽</span>
  </div>

  <!-- ── СРОК ── -->
  <div class="field-header">
    <span class="field-label">Срок</span>
    <span class="field-value" id="term-val">30 дней</span>
  </div>

  <div class="slider-wrap" id="term-wrap">
    <div class="s-rail">
      <div class="s-fill" id="term-fill"></div>
    </div>
    <div class="s-thumb" id="term-thumb"></div>
    <input class="s-input" type="range"
           id="term-range"
           min="0" max="10" value="3" step="1"
           oninput="onTerm(+this.value)">
  </div>

  <div class="slider-labels">
    <span id="term-label-min">45 недель</span>
    <span id="term-label-max">53 недели</span>
  </div>

  <!-- ── КНОПКА ── -->
  <button class="btn-cta" id="btn-cta">Получить 65 000 ₽</button>

</div>

<script>
  /*
   * ПРАВИЛА:
   *  Сумма ≤ 15 000  → срок только дни   (индексы 0–3)
   *  Сумма > 15 000  → срок только недели (индексы 4–10)
   *  После 15 000 следующее значение сразу 35 000 (промежутка нет).
   *  Если двигают срок в «дни» при сумме > 15 000 → сумма снапится к 15 000.
   */

  /* Массив допустимых сумм: 2 000–15 000, затем сразу 35 000–100 000 */
  const SUM_VALUES = [];
  for (let v = 2000;  v <= 15000;  v += 1000) SUM_VALUES.push(v); /* индексы 0–13  */
  for (let v = 35000; v <= 100000; v += 1000) SUM_VALUES.push(v); /* индексы 14–79 */

  const LAST_TAB1_IDX  = 13;  /* индекс 15 000 */
  const FIRST_TAB2_IDX = 14;  /* индекс 35 000 */
  const THRESHOLD      = 15000;
  const IDX_LAST_DAY   = 3;   /* «30 дней»     */
  const IDX_FIRST_WEEK = 4;   /* «45 недель»   */

  const TERMS = [
    '7 дней', '14 дней', '21 день', '30 дней',
    '45 недель', '46 недель', '47 недель', '48 недель',
    '49 недель', '50 недель', '53 недели'
  ];

  let sumIdx  = 44;                 /* стартовый индекс → 65 000 */
  let sumVal  = SUM_VALUES[sumIdx];
  let termIdx = IDX_FIRST_WEEK;

  /* ── Отрисовка суммы ── */
  function renderSum() {
    sumVal = SUM_VALUES[sumIdx];
    const fmt = sumVal.toLocaleString('ru-RU') + ' ₽';
    document.getElementById('sum-val').textContent = fmt;
    document.getElementById('btn-cta').textContent = 'Получить ' + fmt;
    setSlider('sum', sumIdx / (SUM_VALUES.length - 1) * 100);
  }

  /* ── Обработчик слайдера суммы ── */
  function onSum(idx) {
    sumIdx = idx;
    const newGroup = SUM_VALUES[idx] <= THRESHOLD ? 'days' : 'weeks';
    const curGroup = termIdx <= IDX_LAST_DAY ? 'days' : 'weeks';

    if (newGroup !== curGroup) {
      if (newGroup === 'days') {
        setTerm(IDX_LAST_DAY);
        updateTermRange(1);
      } else {
        setTerm(IDX_FIRST_WEEK);
        updateTermRange(2);
      }
    }

    renderSum();
  }

  /* ── Ограничение диапазона слайдера срока + подписи ── */
  function updateTermRange(tab) {
    const r = document.getElementById('term-range');
    if (tab === 1) {
      r.min = 0; r.max = IDX_LAST_DAY;
      if (+r.value > IDX_LAST_DAY) r.value = IDX_LAST_DAY;
      document.getElementById('term-label-min').textContent = TERMS[0];               /* 7 дней  */
      document.getElementById('term-label-max').textContent = TERMS[IDX_LAST_DAY];    /* 30 дней */
    } else {
      r.min = IDX_FIRST_WEEK; r.max = TERMS.length - 1;
      if (+r.value < IDX_FIRST_WEEK) r.value = IDX_FIRST_WEEK;
      document.getElementById('term-label-min').textContent = TERMS[IDX_FIRST_WEEK];  /* 45 недель */
      document.getElementById('term-label-max').textContent = TERMS[TERMS.length - 1];/* 53 недели */
    }
  }

  /* ── Отрисовка срока ── */
  function setTerm(idx) {
    termIdx = idx;
    document.getElementById('term-range').value = idx;
    document.getElementById('term-val').textContent = TERMS[idx];

    let pct;
    if (idx <= IDX_LAST_DAY) {
      pct = idx / IDX_LAST_DAY * 100;
    } else {
      pct = (idx - IDX_FIRST_WEEK) / (TERMS.length - 1 - IDX_FIRST_WEEK) * 100;
    }
    setSlider('term', pct);
  }

  /* ── Обработчик слайдера срока ── */
  function onTerm(idx) {
    /* Дни при сумме > 15 000 → снапим сумму к 15 000 */
    if (idx <= IDX_LAST_DAY && sumVal > THRESHOLD) {
      sumIdx = LAST_TAB1_IDX;
      document.getElementById('sum-range').value = LAST_TAB1_IDX;
      updateTermRange(1);
      renderSum();
    }
    setTerm(idx);
  }

  /* ── Позиция fill + thumb ── */
  function setSlider(id, pct) {
    document.getElementById(id + '-fill').style.width = pct + '%';
    document.getElementById(id + '-thumb').style.left = pct + '%';
  }

  window.addEventListener('resize', () => { renderSum(); setTerm(termIdx); });

  /* ── Инициализация ── */
  updateTermRange(2);       /* старт с группы «недели» */
  renderSum();
  setTerm(IDX_FIRST_WEEK);  /* 45 недель по умолчанию  */
</script>

</body>
</html>
